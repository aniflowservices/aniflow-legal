<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AniFlow</title>
  <script>
    const id = new URLSearchParams(window.location.search).get('id');
    if (id) window.location.replace('aniflow://anime/' + id);
  </script>
</head>
<body style="background:#0a0a0a;color:white;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;">
  <h2 style="color:#6C47FF;">AniFlow</h2>
  <p>Opening...</p>
  <script>
    const id2 = new URLSearchParams(window.location.search).get('id');
    if (id2) document.getElementById('l').href = 'aniflow://anime/' + id2;
  </script>
  <a id="l" href="#" style="color:#6C47FF;margin-top:12px;">Tap to open</a>
</body>
</html>
